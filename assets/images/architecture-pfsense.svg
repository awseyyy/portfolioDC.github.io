<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Architecture pfSense avec DMZ">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0B1120" flood-opacity="0.25"/>
    </filter>
    <style>
      .label  { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #0B1120; font-weight: 600; }
      .sub    { font-family: 'Manrope', sans-serif; font-size: 11px; fill: #475569; }
      .title  { font-family: 'Bricolage Grotesque', sans-serif; font-size: 16px; fill: #0B1120; font-weight: 700; }
      .zonebg { fill: none; stroke-dasharray: 6 4; stroke-width: 2; }
      .zlan   { stroke: #38BDF8; }
      .zdmz   { stroke: #F59E0B; }
      .zwan   { stroke: #64748B; }
      .zlabel { font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 700; }
      .flow   { stroke: #10B981; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .block  { stroke: #EF4444; stroke-width: 2.5; fill: none; stroke-dasharray: 4 4; marker-end: url(#arrowred); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#10B981"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#F8FAFC"/>

  <text x="450" y="40" text-anchor="middle" class="title">Architecture pare-feu pfSense — 3 zones</text>
  <text x="450" y="60" text-anchor="middle" class="sub">Segmentation LAN / DMZ / WAN · filtrage explicite</text>

  <!-- Zone WAN -->
  <rect x="30" y="100" width="230" height="340" rx="12" class="zonebg zwan"/>
  <text x="145" y="125" text-anchor="middle" class="zlabel" fill="#475569">ZONE WAN</text>

  <!-- Zone LAN -->
  <rect x="340" y="100" width="220" height="340" rx="12" class="zonebg zlan"/>
  <text x="450" y="125" text-anchor="middle" class="zlabel" fill="#0284C7">ZONE LAN (trust)</text>

  <!-- Zone DMZ -->
  <rect x="640" y="100" width="230" height="340" rx="12" class="zonebg zdmz"/>
  <text x="755" y="125" text-anchor="middle" class="zlabel" fill="#B45309">ZONE DMZ (semi-trust)</text>

  <!-- Internet -->
  <g filter="url(#sh2)">
    <ellipse cx="145" cy="180" rx="80" ry="30" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
    <text x="145" y="177" text-anchor="middle" class="title">🌐 Internet</text>
    <text x="145" y="195" text-anchor="middle" class="sub">ext. networks</text>
  </g>

  <!-- pfSense central -->
  <g filter="url(#sh2)">
    <rect x="380" y="240" width="140" height="90" rx="12" fill="#0B1120"/>
    <text x="450" y="270" text-anchor="middle" style="font-family:'Bricolage Grotesque';font-size:16px;fill:white;font-weight:700;">🛡 pfSense</text>
    <text x="450" y="290" text-anchor="middle" style="font-family:'JetBrains Mono';font-size:11px;fill:#38BDF8;font-weight:600;">FIREWALL + NAT</text>
    <text x="450" y="308" text-anchor="middle" style="font-family:'Manrope';font-size:10px;fill:#94A3B8;">default deny</text>
  </g>

  <!-- LAN clients -->
  <g filter="url(#sh2)">
    <rect x="360" y="350" width="180" height="60" rx="10" fill="white" stroke="#38BDF8" stroke-width="2"/>
    <text x="450" y="375" text-anchor="middle" class="title">💻 Postes + serveurs</text>
    <text x="450" y="395" text-anchor="middle" class="sub">10.0.0.0/24</text>
  </g>

  <!-- DMZ serveur -->
  <g filter="url(#sh2)">
    <rect x="670" y="240" width="180" height="90" rx="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="760" y="265" text-anchor="middle" class="title">🌐 WEB01</text>
    <text x="760" y="285" text-anchor="middle" class="label">Apache public</text>
    <text x="760" y="305" text-anchor="middle" class="sub">10.0.10.10</text>
    <text x="760" y="322" text-anchor="middle" class="sub">HTTP · HTTPS</text>
  </g>

  <!-- Flows: Internet → DMZ (OK) -->
  <path class="flow" d="M220 210 Q 450 150 670 270"/>
  <text x="450" y="155" text-anchor="middle" style="font-family:'JetBrains Mono';font-size:10px;fill:#10B981;font-weight:700;">✔ NAT 80/443 → WEB01</text>

  <!-- Flows: LAN → Internet (OK) -->
  <path class="flow" d="M380 330 L 230 220"/>
  <text x="290" y="280" style="font-family:'JetBrains Mono';font-size:10px;fill:#10B981;font-weight:700;">✔ LAN → WAN</text>

  <!-- Flows: LAN → DMZ web only (OK) -->
  <path class="flow" d="M520 300 Q 580 280 670 290"/>
  <text x="560" y="270" style="font-family:'JetBrains Mono';font-size:9px;fill:#10B981;font-weight:700;">✔ 80/443</text>

  <!-- Block: DMZ → LAN -->
  <path class="block" d="M670 320 Q 580 340 520 340"/>
  <text x="560" y="360" style="font-family:'JetBrains Mono';font-size:10px;fill:#EF4444;font-weight:700;">✗ DMZ → LAN bloqué</text>

  <!-- Legend -->
  <g transform="translate(30 455)">
    <line x1="0" y1="0" x2="24" y2="0" class="flow"/>
    <text x="32" y="4" style="font-family:'Manrope';font-size:11px;fill:#1a1a1a;">Flux autorisé</text>

    <line x1="170" y1="0" x2="194" y2="0" class="block"/>
    <text x="202" y="4" style="font-family:'Manrope';font-size:11px;fill:#1a1a1a;">Flux bloqué (sécurité DMZ)</text>
  </g>
</svg>
